<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rentas — Gestión Inmobiliaria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
:root{--bg:#0f0f0f;--s1:#1a1a1a;--s2:#252525;--s3:#2e2e2e;--gold:#D4A843;--gdim:#9A7A2F;--txt:#F0EAD6;--dim:#777;--r:#E05C5C;--g:#5CB87A;--y:#E0B840;--b:#5B9BD5;--p:#B074D4;--nav:68px;--rad:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--txt);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;font-size:14px}
.hdr{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:1px solid #1c1c1c}
.hdr-t{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold)}
.hdr-s{font-size:11px;color:var(--dim);margin-top:2px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#111;border-top:1px solid #1c1c1c;display:flex;height:var(--nav);z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--dim);font-size:10px;font-weight:500;border:none;background:none;padding:0;position:relative;transition:color .15s}
.ni.on{color:var(--gold)}
.ni svg{width:20px;height:20px;stroke-width:1.8}
.nd{width:7px;height:7px;background:var(--r);border-radius:50%;position:absolute;top:8px;right:calc(50% - 13px);display:none}
.mc{padding:12px 14px calc(var(--nav) + 14px)}
.view{display:none}.view.on{display:block}
.card{background:var(--s1);border-radius:var(--rad);padding:14px;margin-bottom:10px;border:1px solid #222}
.card.gd{border-left:3px solid var(--gold)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.sc{background:var(--s1);border-radius:var(--rad);padding:13px;border:1px solid #222;text-align:center}
.sl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sv{font-family:'Playfair Display',serif;font-size:21px;color:var(--gold)}
.sv.r{color:var(--r)}.sv.g{color:var(--g)}.sv.b{color:var(--b)}
.svm{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold)}
.st{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:11px;margin-top:4px}
.st-sm{font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;border:none;white-space:nowrap}
.bg{background:var(--gold);color:#111}.bg:active{background:var(--gdim)}
.bo{background:transparent;color:var(--gold);border:1px solid var(--gold)}.bo:active{background:#D4A84322}
.bd{background:#E05C5C22;color:var(--r);border:1px solid #E05C5C44}
.bs{background:#5CB87A22;color:var(--g);border:1px solid #5CB87A44}
.bb{background:#5B9BD522;color:var(--b);border:1px solid #5B9BD544}
.bfu{width:100%;text-align:center}
.bsm{padding:7px 11px;font-size:12px}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--dim);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;background:var(--s2);border:1px solid #333;border-radius:9px;padding:10px 13px;color:var(--txt);font-size:14px;outline:none;font-family:inherit}
.fi:focus{border-color:var(--gold)}
select.fi{appearance:none}
textarea.fi{resize:vertical;min-height:60px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(5px)}
.ms{background:#161616;border-radius:22px 22px 0 0;padding:18px 18px 30px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid #2a2a2a}
.mh{width:38px;height:4px;background:#333;border-radius:2px;margin:0 auto 14px}
.mt2{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);margin-bottom:16px}
.fab{position:fixed;bottom:calc(var(--nav) + 14px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:#111;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(212,168,67,.35);z-index:50;font-size:22px;line-height:1}
.fab:active{transform:scale(.93)}
.snk{position:fixed;bottom:calc(var(--nav)+14px);left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90%}
.snk.show{opacity:1}
.cr{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;scrollbar-width:none}
.cr::-webkit-scrollbar{display:none}
.chip{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--s2);color:var(--dim);border:1px solid #2e2e2e;flex-shrink:0;white-space:nowrap}
.chip.on{background:var(--gold);color:#111;border-color:var(--gold)}
.subnav{display:flex;background:var(--s1);border-radius:10px;padding:3px;margin-bottom:14px;border:1px solid #222;gap:2px}
.subnav button{flex:1;padding:9px 4px;background:none;border:none;color:var(--dim);font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s}
.subnav button.on{background:var(--gdim);color:#fff}
.inm-group{margin-bottom:10px;background:var(--s1);border-radius:12px;border:1px solid #222;overflow:hidden}
.inm-hd{padding:12px 14px;background:#1f1f1f;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #252525}
.inm-hd-l{display:flex;align-items:center;gap:8px}
.inm-nom{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);font-weight:600;letter-spacing:.3px}
.inm-meta{font-size:10px;color:var(--dim);margin-top:1px}
.inm-arrow{color:var(--dim);transition:transform .2s;font-size:13px}
.inm-arrow.open{transform:rotate(90deg)}
.inm-body{display:none}
.inm-body.open{display:block}
.row-inq{display:flex;align-items:center;gap:9px;padding:11px 12px;border-bottom:1px solid #1d1d1d;cursor:pointer;transition:background .12s}
.row-inq:last-child{border-bottom:none}
.row-inq:active{background:var(--s2)}
.row-inq.paid{background:#5CB87A0a}
.row-inq.late{background:#E05C5C0a}
.chkbox{width:24px;height:24px;border-radius:7px;border:1.5px solid #444;background:#161616;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.chkbox.on{background:var(--g);border-color:var(--g)}
.chkbox.on::after{content:"✓";color:#fff;font-size:14px;font-weight:700}
.chkbox.late{border-color:var(--r)}
.inq-dia{width:32px;text-align:center;font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);font-weight:600;flex-shrink:0}
.inq-info{flex:1;min-width:0}
.inq-nom{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inq-sub{font-size:10px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inq-monto{font-size:12px;font-weight:600;color:var(--gold);text-align:right;flex-shrink:0;white-space:nowrap}
.inq-tstamp{font-size:9px;color:var(--g);margin-top:2px;text-align:right}
.confirm-msg{text-align:center;padding:14px 0 20px}
.confirm-q{font-family:'Playfair Display',serif;font-size:17px;color:var(--txt);margin-bottom:6px}
.confirm-sub{font-size:12px;color:var(--dim)}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bk{background:none;border:none;color:var(--gold);font-size:13px;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:3px;margin-bottom:14px}
.ir{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e1e1e}
.ir:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.iv{font-size:13px;font-weight:500;text-align:right;max-width:60%}
.tag-g{color:var(--g)}.tag-gd{color:var(--gold)}.tag-r{color:var(--r)}
.bge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.bge.v{background:#E05C5C22;color:var(--r);border:1px solid #E05C5C44}
.bge.ok{background:#5CB87A22;color:var(--g);border:1px solid #5CB87A44}
.bge.ad{background:#88888822;color:var(--dim);border:1px solid #33333366}
.bge.b{background:#5B9BD522;color:var(--b);border:1px solid #5B9BD544}
.bge.y{background:#E0B84022;color:var(--y);border:1px solid #E0B84044}
.bge.p{background:#B074D422;color:var(--p);border:1px solid #B074D444}
.av{width:42px;height:42px;border-radius:50%;background:var(--gdim);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;color:#fff;flex-shrink:0}
.es{text-align:center;padding:36px 20px;color:var(--dim)}
.ei{font-size:36px;margin-bottom:10px}
.et{font-size:13px;line-height:1.5}
.ti{background:var(--s1);border-radius:var(--rad);padding:12px 14px;margin-bottom:8px;border:1px solid #222;cursor:pointer;display:flex;align-items:center;gap:11px}
.ti:active{background:var(--s2)}
.tn{flex:1;min-width:0}
.tnm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ts{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #1e1e1e}
.pr:last-child{border-bottom:none}
.pi{flex:1;min-width:0}.pn{font-weight:500;font-size:13px}.pd{font-size:11px;color:var(--dim);margin-top:1px}
.pa{font-family:'Playfair Display',serif;font-size:15px;color:var(--g);white-space:nowrap}
.pa.r{color:var(--r)}
.ro{background:var(--s1);border-radius:var(--rad);padding:14px;margin-bottom:10px;border:1px solid #222;cursor:pointer;display:flex;align-items:center;gap:12px}
.ro:active{background:var(--s2)}
.rtit{font-weight:600;font-size:14px}.rdesc{font-size:12px;color:var(--dim);margin-top:2px}
.progress-bar{height:6px;background:#252525;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-bar>div{height:100%;background:linear-gradient(90deg,var(--g),var(--gold));transition:width .3s}
.summary-card{background:linear-gradient(135deg,#1a1a1a,#222);border:1px solid var(--gdim);border-radius:14px;padding:16px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cat-card{background:var(--s1);border:1px solid #222;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.cat-icon{font-size:22px;width:36px;text-align:center}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.cat-amt{font-family:'Playfair Display',serif;font-size:16px;color:var(--r);font-weight:600}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.photo-thumb{aspect-ratio:1;border-radius:8px;background-size:cover;background-position:center;border:1px solid #333;position:relative;cursor:pointer}
.photo-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.photo-add{aspect-ratio:1;border-radius:8px;background:var(--s2);border:1.5px dashed #444;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;gap:3px;font-size:10px}
.photo-add:active{background:var(--s3)}
.gasto-row{background:var(--s1);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #222;display:flex;align-items:center;gap:11px;cursor:pointer}
.gasto-row:active{background:var(--s2)}
.gasto-icon{width:38px;height:38px;border-radius:10px;background:#E05C5C22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.gasto-info{flex:1;min-width:0}
.gasto-desc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gasto-meta{font-size:10px;color:var(--dim);margin-top:2px}
.gasto-amt{font-family:'Playfair Display',serif;font-size:15px;color:var(--r);font-weight:600;white-space:nowrap}
.lvl-1{color:var(--g);border-color:#5CB87A66}
.lvl-2{color:var(--y);border-color:#E0B84066}
.lvl-3{color:#E58A2C;border-color:#E58A2C66}
.lvl-4{color:var(--r);border-color:#E05C5C66}
.num-inc{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);letter-spacing:.5px}
.modal-img{max-width:100%;border-radius:10px;margin-bottom:8px}
.full-img{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.full-img img{max-width:100%;max-height:100%;border-radius:8px}
.full-img button{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}

.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f0f0f,#1a1a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;padding:30px;text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-size:42px;color:#D4A843;letter-spacing:1.5px;margin-bottom:8px}
.login-sub{font-size:11px;color:#666;letter-spacing:4px;text-transform:uppercase;margin-bottom:60px}
.login-msg{color:#888;font-size:13px;margin-bottom:30px;line-height:1.6;max-width:320px}
.btn-google{background:#fff;color:#222;border:none;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 4px 18px rgba(0,0,0,.3)}
.btn-google:active{transform:scale(.97)}
.cloud-status{position:fixed;top:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;font-size:9px;text-align:center;padding:2px 0;background:#0a0a0a;color:#555;z-index:15;border-bottom:1px solid #1a1a1a;letter-spacing:.5px;text-transform:uppercase}
.cloud-status.syncing{color:#D4A843}
.cloud-status.synced{color:#5CB87A}
.cloud-status.error{color:#E05C5C}
.cloud-status.offline{color:#777}
</style>
</head>
<body>
<div class="login-screen" id="login-overlay" style="display:none">
  <div class="login-logo">Rentas</div>
  <div class="login-sub">Gestión Inmobiliaria</div>
  <div class="login-msg">Inicia sesión con tu cuenta de Google para sincronizar tus datos entre todos tus dispositivos.</div>
  <button class="btn-google" onclick="signInGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continuar con Google
  </button>
  <div style="font-size:10px;color:#444;margin-top:40px;max-width:300px;line-height:1.5">Tus datos se guardan en tu cuenta de Firebase. Solo tú tienes acceso.</div>
</div>
<div class="cloud-status" id="cloud-status">Sin sincronización</div>

<div id="app">
  <div id="splash" style="position:fixed;inset:0;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999">
    <div style="font-family:'Playfair Display',serif;font-size:30px;color:#D4A843;letter-spacing:1px">Rentas</div>
    <div style="font-size:11px;color:#444;margin-top:8px;letter-spacing:3px;text-transform:uppercase">Gestión Inmobiliaria</div>
    <div style="width:44px;height:2px;background:#D4A843;border-radius:2px;margin-top:28px;animation:pu 1s infinite alternate"></div>
    <style>@keyframes pu{from{opacity:.2}to{opacity:1}}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f0f0f,#1a1a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;padding:30px;text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-size:42px;color:#D4A843;letter-spacing:1.5px;margin-bottom:8px}
.login-sub{font-size:11px;color:#666;letter-spacing:4px;text-transform:uppercase;margin-bottom:60px}
.login-msg{color:#888;font-size:13px;margin-bottom:30px;line-height:1.6;max-width:320px}
.btn-google{background:#fff;color:#222;border:none;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 4px 18px rgba(0,0,0,.3)}
.btn-google:active{transform:scale(.97)}
.cloud-status{position:fixed;top:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;font-size:9px;text-align:center;padding:2px 0;background:#0a0a0a;color:#555;z-index:15;border-bottom:1px solid #1a1a1a;letter-spacing:.5px;text-transform:uppercase}
.cloud-status.syncing{color:#D4A843}
.cloud-status.synced{color:#5CB87A}
.cloud-status.error{color:#E05C5C}
.cloud-status.offline{color:#777}
</style>
  </div>
  <header class="hdr" id="hdr">
    <div><div class="hdr-t" id="hdr-t">Panel</div><div class="hdr-s" id="hdr-s"></div></div>
    <div id="hdr-a" style="display:flex;gap:7px"></div>
  </header>
  <main class="mc">
    <div id="v-dash" class="view on"></div>
    <div id="v-con" class="view"></div>
    <div id="v-inq" class="view"></div>
    <div id="v-det" class="view"></div>
    <div id="v-svc" class="view"></div>
    <div id="v-rep" class="view"></div>
  </main>
  <nav class="nav">

function updateDashCloudCard() {
  const el = document.getElementById('dash-cloud-card');
  if (!el) return;
  const cfg = {
    syncing: {icon:'⟳', bg:'#E0B840', label:'Guardando en la nube...'},
    synced:  {icon:'✓', bg:'#5CB87A', label:'Todo sincronizado'},

    offline: {icon:'☾', bg:'#777',    label:'Sin sesión iniciada'}
  };
  const c = cfg[cloudStateNow] || cfg.offline;
  el.style.borderColor = c.bg;
  el.innerHTML = `<div style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:50%;background:${c.bg}22;border:2px solid ${c.bg};display:flex;align-items:center;justify-content:center;font-size:20px;color:${c.bg};font-weight:700">${c.icon}</div>

}

  if (PHOTO_COLLS.includes(coll) && item.fotos) {
    const {fotos, ...rest} = item;
    return {...rest, _hasPhotos: fotos.length, _photoDevice: navigator.userAgent.slice(0,50)};
  }
  return item;
}

async function initialCloudSync() {
  const uid = currentUser.uid;
  try {
    // Check if cloud has data
    const probe = await fdb.doc(`users/${uid}/data/inquilinos`).get();
    if (!probe.exists || !probe.data()?.items?.length) {
      // First time: upload everything from localStorage
      if (DB.inquilinos && DB.inquilinos.length > 0) {
        await uploadAllToCloud();
        snack('☁️ Datos iniciales subidos a la nube');
      }
    } else {
      await downloadAllFromCloud();
      snack('☁️ Datos descargados de la nube');
    }
  } catch (e) {
    console.error('Initial sync error:', e);
    setCloudStatus('error', '⚠️ Error de sincronización');
  }
}

async function uploadAllToCloud() {
  const uid = currentUser.uid;
  for (const k of SYNC_COLLS) {
    if (!DB[k]) DB[k] = [];
    const items = DB[k].map(item => stripPhotos(k, item));
    await fdb.doc(`users/${uid}/data/${k}`).set({
      items, updated: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
}

async function downloadAllFromCloud() {
  const uid = currentUser.uid;
  for (const k of SYNC_COLLS) {
    try {
      const doc = await fdb.doc(`users/${uid}/data/${k}`).get();
      if (!doc.exists) continue;
      let cloudItems = doc.data().items || [];
      
      if (PHOTO_COLLS.includes(k)) {
        // Preserve local photos
        const localMap = {};
        (DB[k]||[]).forEach(item => { if (item.fotos) localMap[item.id] = item.fotos; });
        cloudItems = cloudItems.map(item => {
          if (localMap[item.id]) return {...item, fotos: localMap[item.id]};
          return {...item, fotos: []};
        });
      }
      DB[k] = cloudItems;
      saveDBLocal(k);
    } catch (e) {
      console.error(`Load ${k}:`, e);
    }
  }
  rerender();
}

function subscribeToCloud() {
  const uid = currentUser.uid;
  cloudUnsubs.forEach(u => u());
  cloudUnsubs = [];
  
  SYNC_COLLS.forEach(k => {
    const unsub = fdb.doc(`users/${uid}/data/${k}`).onSnapshot(doc => {
      if (doc.metadata.hasPendingWrites) return; // local write - skip
      if (!doc.exists) return;
      
      let cloudItems = doc.data().items || [];
      if (PHOTO_COLLS.includes(k)) {
        const localMap = {};
        (DB[k]||[]).forEach(item => { if (item.fotos) localMap[item.id] = item.fotos; });
        cloudItems = cloudItems.map(item => {
          if (localMap[item.id]) return {...item, fotos: localMap[item.id]};
          return {...item, fotos: []};
        });
      }
      DB[k] = cloudItems;
      saveDBLocal(k);
      setCloudStatus('synced','☁️ Actualizado · ' + new Date().toLocaleTimeString('es-MX'));
      rerender();
    }, err => {
      console.error('Snapshot error:', err);
      setCloudStatus('error', '⚠️ Error: ' + err.code);
    });
    cloudUnsubs.push(unsub);
  });
}

// Local-only save (was previously called saveDB)
function saveDBLocal(k){
  try{localStorage.setItem("rentas_"+k,JSON.stringify(DB[k]))}

}

function cloudSaveDebounced(k) {
  if (!cloudSyncEnabled || !currentUser) return;
  clearTimeout(saveTimers[k]);
  setCloudStatus('syncing','☁️ Guardando...');
  saveTimers[k] = setTimeout(() => cloudSaveNow(k), 150);
}

async function cloudSaveNow(k) {
  if (!currentUser) return;
  const uid = currentUser.uid;
  try {
    if (!DB[k]) DB[k] = [];
    const items = DB[k].map(item => stripPhotos(k, item));
    await fdb.doc(`users/${uid}/data/${k}`).set({
      items, updated: firebase.firestore.FieldValue.serverTimestamp()
    });
    setCloudStatus('synced','☁️ Guardado · ' + new Date().toLocaleTimeString('es-MX'));
  } catch (e) {
    console.error('Cloud save error:', e);
    setCloudStatus('error', '⚠️ Sin conexión — se guardó local');
  }
}

function fmt(n){return"$"+Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:0})}

function getPago(iid,m,a){return DB.pagos.find(p=>p.iid===iid&&p.mes===m&&p.anio===a&&p.pagado)}
function isPagado(iid,m,a){return!!getPago(iid,m,a)}
function isLate(iid,m,a){
  if(getPago(iid,m,a))return false;
  if(a>HA||(a===HA&&m>HM))return false;
  if(a<HA||(a===HA&&m<HM))return true;

}

// ── Image compression ─────────────
async function compressImage(file,maxW=1024,q=0.65){
  return new Promise((resolve)=>{
    const r=new FileReader();
    r.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxW){h=h*maxW/w;w=maxW;}
        c.width=w;c.height=h;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',q));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function nextIncidentNum(){

// ── Date range helpers ────────────
function getRange(mode){
  const t=new Date();t.setHours(0,0,0,0);
  if(mode==='hoy')return{ini:t,fin:new Date(t.getTime()+86400000-1),label:'Hoy '+t.toLocaleDateString('es-MX')};
  if(mode==='ayer'){const a=new Date(t.getTime()-86400000);return{ini:a,fin:new Date(t.getTime()-1),label:'Ayer '+a.toLocaleDateString('es-MX')};}
  if(mode==='semana'){const d=t.getDay()||7;const ini=new Date(t.getTime()-(d-1)*86400000);return{ini,fin:new Date(t.getTime()+86400000-1),label:'Esta semana'};}
  if(mode==='sem_pas'){const d=t.getDay()||7;const ini=new Date(t.getTime()-(d-1+7)*86400000);const fin=new Date(ini.getTime()+7*86400000-1);return{ini,fin,label:'Semana pasada'};}
  if(mode==='mes')return{ini:new Date(t.getFullYear(),t.getMonth(),1),fin:new Date(t.getFullYear(),t.getMonth()+1,0,23,59,59),label:MF[t.getMonth()]+' '+t.getFullYear()};
  if(mode==='custom'&&rangeStart&&rangeEnd){const i=new Date(rangeStart);const f=new Date(rangeEnd);f.setHours(23,59,59);return{ini:i,fin:f,label:rangeStart+' a '+rangeEnd};}
  return{ini:t,fin:new Date(t.getTime()+86400000-1),label:'Hoy'};
}

function saveInmueble(nombreActual){
  const nuevoNom=document.getElementById('im-nom').value.trim();
  const prop=document.getElementById('im-prop').value;
  const total=Number(document.getElementById('im-total').value)||0;
  const notas=document.getElementById('im-notas').value.trim();
  if(!nuevoNom){snack('Nombre requerido');return;}
  // Actualizar registro inmueble
  let inm=DB.inmuebles.find(x=>x.nombre===nombreActual);
  if(inm){inm.nombre=nuevoNom;inm.total_depas=total;inm.notas=notas;if(prop)inm.propietario=prop;}
  else{DB.inmuebles.push({id:uid(),nombre:nuevoNom,total_depas:total,notas,propietario:prop||''});}
  // Si cambió el nombre, actualizar todos los inquilinos
  if(nuevoNom!==nombreActual){
    DB.inquilinos.forEach(t=>{if(t.inmueble===nombreActual)t.inmueble=nuevoNom;});
  }
  // Si seleccionó propietario, actualizar inquilinos
  if(prop){
    DB.inquilinos.forEach(t=>{if(t.inmueble===nuevoNom)t.propietario=prop;});
  }
  saveDB('inmuebles');saveDB('inquilinos');
  closeM();snack('Inmueble actualizado ✓');renderCon();
}

function doMarkPago(iid,m,a){
  const t=DB.inquilinos.find(x=>x.id===iid);

  const hora=document.getElementById('p-hora').value;

  if(!monto||!fecha||!hora){snack('Completa los campos');return;}
  const fechaPago=new Date(fecha+'T'+hora+':00').toISOString();
  // Detectar adelantado
  const isMesFuturo=(a>HA||(a===HA&&m>HM));
  const isAntesDia=(a===HA&&m===HM&&HD<Number(t.dia||1));
  const adelantado=isMesFuturo||isAntesDia;
  DB.pagos=DB.pagos.filter(p=>!(p.iid===iid&&p.mes===m&&p.anio===a));

  updNotif();
}

function renderHistorial(){
  let chips=`<div class="cr">`;
  for(let i=0;i<8;i++){
    const d=new Date(HA,HM-1-i,1);const m=d.getMonth()+1,a=d.getFullYear();
    const sel=(m===curMes&&a===curAnio);
    chips+=`<span class="chip${sel?' on':''}" onclick="curMes=${m};curAnio=${a};renderCon()">${MN[m-1]} ${a}</span>`;
  }
  chips+=`</div>`;
  const ps=DB.pagos.filter(p=>p.mes===curMes&&p.anio===curAnio&&p.pagado);
  const sorted=[...ps].sort((a,b)=>new Date(b.fecha_pago||0)-new Date(a.fecha_pago||0));
  const total=ps.reduce((s,p)=>s+Number(p.monto),0);
  let html=chips;
  html+=`<div class="sg"><div class="sc"><div class="sl">Total cobrado</div><div class="sv g">${fmt(total)}</div></div>
    <div class="sc"><div class="sl">Registros</div><div class="sv">${ps.length}</div></div></div>`;
  html+=`<div class="card" style="padding:0 14px">`;
  if(sorted.length===0)html+=`<div class="es" style="padding:20px"><div class="et">Sin pagos en este periodo</div></div>`;
  sorted.forEach(p=>{
    const t=DB.inquilinos.find(i=>i.id===p.iid);
    const fp=p.fecha_pago?new Date(p.fecha_pago):null;
    const fStr=fp?fp.toLocaleString('es-MX',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    html+=`<div class="pr"><div class="pi"><div class="pn">${t?.nombre||'(eliminado)'}</div>
    <div class="pd">${t?.inmueble||''}${t?.interior?' · '+t.interior:''} · ${fStr}${p.destino?' · '+p.destino:''}</div></div>
    <div class="pa">${fmt(p.monto)}</div></div>`;
  });
  html+=`</div>`;
  document.getElementById("con-content").innerHTML=html;
}

function renderGastos(){
  const r=getRange(rangeMode);
  let chips=`<div class="cr">
    <span class="chip${rangeMode==='hoy'?' on':''}" onclick="rangeMode='hoy';renderCon()">Hoy</span>
    <span class="chip${rangeMode==='ayer'?' on':''}" onclick="rangeMode='ayer';renderCon()">Ayer</span>
    <span class="chip${rangeMode==='semana'?' on':''}" onclick="rangeMode='semana';renderCon()">Esta semana</span>
    <span class="chip${rangeMode==='sem_pas'?' on':''}" onclick="rangeMode='sem_pas';renderCon()">Sem. pasada</span>
    <span class="chip${rangeMode==='mes'?' on':''}" onclick="rangeMode='mes';renderCon()">Este mes</span>
    <span class="chip${rangeMode==='custom'?' on':''}" onclick="openCustomRange()">📅 Personalizado</span>
    </div>`;
  const gs=DB.gastos.filter(g=>{if(!g.fecha)return false;const d=new Date(g.fecha);if(isNaN(d))return false;return d>=r.ini&&d<=r.fin;}).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const total=gs.reduce((s,g)=>s+Number(g.monto),0);
  // Por categoría
  const porCat={};
  gs.forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+Number(g.monto)});
  let html=chips;
  html+=`<div class="summary-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase">${r.label}</div>
      <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--r);margin-top:3px">${fmt(total)}</div>
      <div style="font-size:11px;color:var(--dim)">${gs.length} gastos registrados</div></div>
      <button class="btn bo bsm" onclick="exportExcelMovs()">📥 Excel</button>
    </div></div>`;
  // Cards por categoría
  if(Object.keys(porCat).length>0){
    html+=`<div class="cat-grid">`;
    Object.entries(porCat).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
      const c=CATS_GASTO[k]||CATS_GASTO.otros;
      html+=`<div class="cat-card"><div class="cat-icon">${c.i}</div><div class="cat-info"><div class="cat-name">${c.n}</div><div class="cat-amt">${fmt(v)}</div></div></div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="st">Movimientos</div>`;
  if(gs.length===0){html+=`<div class="es"><div class="ei">💸</div><div class="et">Sin gastos en este periodo<br><br><button class="btn bg bsm" onclick="openAddGasto()">+ Agregar gasto</button></div></div>`;}
  else{
    gs.forEach(g=>{
      const c=CATS_GASTO[g.categoria]||CATS_GASTO.otros;
      const f=new Date(g.fecha).toLocaleDateString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      html+=`<div class="gasto-row" onclick="openAddGasto('${g.id}')">
        <div class="gasto-icon">${c.i}</div>
        <div class="gasto-info"><div class="gasto-desc">${g.descripcion||c.n}</div>
        <div class="gasto-meta">${c.n}${g.inmueble?' · '+g.inmueble:''} · ${f}</div></div>
        <div class="gasto-amt">-${fmt(g.monto)}</div></div>`;
    });
  }
  document.getElementById("con-content").innerHTML=html;
}

function saveGasto(id){
  const cat=document.getElementById('g-cat').value;
  const monto=document.getElementById('g-monto').value;
  const desc=document.getElementById('g-desc').value.trim();
  const fecha=document.getElementById('g-fecha').value;
  if(!monto||!desc||!fecha){snack('Completa los campos obligatorios');return;}
  // Parse local date properly (avoid timezone parsing issues)
  const [yy,mm,dd]=fecha.split('-').map(Number);
  const now=new Date();
  const fechaLocal=new Date(yy,mm-1,dd,now.getHours(),now.getMinutes(),now.getSeconds());
  const obj={
    categoria:cat,monto:Number(monto),descripcion:desc,
    fecha:fechaLocal.toISOString(),
    inmueble:document.getElementById('g-inm').value.trim(),
    notas:document.getElementById('g-notas').value.trim()
  };
  if(id){Object.assign(DB.gastos.find(x=>x.id===id),obj);}
  else{DB.gastos.push({id:uid(),...obj,creado:nowISO()});}
  saveDB('gastos');closeM();snack(id?'Gasto actualizado ✓':'Gasto registrado ✓');renderCon();
}

function delGasto(id){
  if(!confirm('¿Eliminar este gasto?'))return;
  DB.gastos=DB.gastos.filter(g=>g.id!==id);
  saveDB('gastos');closeM();snack('Eliminado');renderCon();
}

function saveOtroIngreso(id){
  const cat=document.getElementById('oi-cat').value;
  const monto=document.getElementById('oi-monto').value;
  const concepto=document.getElementById('oi-concepto').value.trim();
  const fecha=document.getElementById('oi-fecha').value;
  if(!monto||!concepto||!fecha){snack('Completa los campos obligatorios');return;}
  const [yy,mm,dd]=fecha.split('-').map(Number);
  const now=new Date();
  const fechaLocal=new Date(yy,mm-1,dd,now.getHours(),now.getMinutes(),now.getSeconds());
  const obj={
    categoria:cat,monto:Number(monto),concepto,
    fecha:fechaLocal.toISOString(),
    inmueble:document.getElementById('oi-inm').value.trim(),
    inqId:document.getElementById('oi-inq').value,
    destino:document.getElementById('oi-dest').value.trim(),
    metodo:document.getElementById('oi-met').value,
    notas:document.getElementById('oi-notas').value.trim()
  };
  if(id){Object.assign(DB.otros_ingresos.find(x=>x.id===id),obj);}
  else{DB.otros_ingresos.push({id:uid(),...obj,creado:nowISO()});}
  saveDB('otros_ingresos');closeM();snack(id?'Ingreso actualizado ✓':'Ingreso registrado ✓');renderCon();
}

function delOtroIngreso(id){
  if(!confirm('¿Eliminar este ingreso?'))return;
  DB.otros_ingresos=DB.otros_ingresos.filter(o=>o.id!==id);
  saveDB('otros_ingresos');closeM();snack('Eliminado');renderCon();
}

// ─── EXPORTS ─────────────────────────────────────
function exportExcelMes(){
  const act=DB.inquilinos.filter(i=>i.estado==='activo');
  if(act.length===0){
    snack('⚠️ No hay inquilinos activos. ¿Se completó la sincronización?');
    return;
  }
  const rows=[['Pagado','FECHA','LUGAR','NOMBRE','INT','CANTIDAD','DESTINO','SERVICIOS','ESTATUS','RENOVACIÓN','COMENTARIOS','MEDIDOR DE LUZ','CONTRATO VIGENTE','FECHA DE PAGO','MÉTODO']];
  const grupos={};
  act.forEach(i=>{if(!grupos[i.inmueble])grupos[i.inmueble]=[];grupos[i.inmueble].push(i);});
  Object.keys(grupos).sort().forEach(inm=>{
    grupos[inm].sort((a,b)=>(a.dia||0)-(b.dia||0));
    grupos[inm].forEach(i=>{
      const p=getPago(i.id,curMes,curAnio);
      const dia=i.dia===30?0.3:i.dia;
      const fp=p?.fecha_pago?new Date(p.fecha_pago).toLocaleString('es-MX'):'';
      const dest=p?.destino||i.destino||'';
      rows.push([p?true:false,dia,i.inmueble,i.nombre,i.interior||'',p?.monto||i.renta,dest,i.servicios||'',i.estatus||'Al corriente',i.renovacion||'',i.comentarios||'',i.medidor||'',i.contrato_vigente||'',fp,p?.metodo||'']);
    });
  });
  rows.push([]);
  const totalCob=act.filter(i=>isPagado(i.id,curMes,curAnio)).reduce((s,i)=>{const p=getPago(i.id,curMes,curAnio);return s+Number(p?.monto||0);},0);
  const totalEsp=act.reduce((s,i)=>s+Number(i.renta),0);
  rows.push(['','','','TOTAL ESPERADO:','',totalEsp]);
  rows.push(['','','','TOTAL COBRADO:','',totalCob]);
  rows.push(['','','','PENDIENTE:','',totalEsp-totalCob]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{w:8},{w:8},{w:18},{w:30},{w:8},{w:12},{w:10},{w:18},{w:14},{w:14},{w:25},{w:10},{w:14},{w:20},{w:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,`${MF[curMes-1].toUpperCase()} ${curAnio}`);
  XLSX.writeFile(wb,`lista_inquilinaria_${MN[curMes-1]}_${curAnio}.xlsx`);
  snack(`📥 Excel con ${act.length} inquilinos`);
}

function exportExcelMovs(){
  const r=getRange(rangeMode);
  const pagosFiltered=DB.pagos.filter(p=>{if(!p.fecha_pago||!p.pagado)return false;const d=new Date(p.fecha_pago);return d>=r.ini&&d<=r.fin;});
  const gastosFiltered=DB.gastos.filter(g=>{const d=new Date(g.fecha);return d>=r.ini&&d<=r.fin;});
  if(pagosFiltered.length===0&&gastosFiltered.length===0){
    snack(`⚠️ Sin movimientos en ${r.label}. Cambia el periodo.`);
    return;
  }
  const wb=XLSX.utils.book_new();
  // Sheet 1: Ingresos
  const ingRows=[['FECHA','HORA','INQUILINO','INMUEBLE','INTERIOR','MES PAGADO','MONTO','DESTINO','MÉTODO']];
  pagosFiltered.sort((a,b)=>new Date(a.fecha_pago)-new Date(b.fecha_pago)).forEach(p=>{
    const t=DB.inquilinos.find(i=>i.id===p.iid);const d=new Date(p.fecha_pago);
    ingRows.push([d.toLocaleDateString('es-MX'),d.toLocaleTimeString('es-MX'),t?.nombre||'',t?.inmueble||'',t?.interior||'',MF[p.mes-1]+' '+p.anio,p.monto,p.destino||'',p.metodo||'efectivo']);
  });
  const totalIng=pagosFiltered.reduce((s,p)=>s+Number(p.monto),0);
  ingRows.push([]);ingRows.push(['','','','','','TOTAL:',totalIng]);
  const ws1=XLSX.utils.aoa_to_sheet(ingRows);
  ws1['!cols']=[{w:12},{w:10},{w:30},{w:18},{w:10},{w:16},{w:12},{w:12},{w:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'Ingresos');
  // Sheet 2: Gastos
  const gRows=[['FECHA','CATEGORÍA','DESCRIPCIÓN','INMUEBLE','MONTO','NOTAS']];
  const gastos=gastosFiltered.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  gastos.forEach(g=>{
    const c=CATS_GASTO[g.categoria]||CATS_GASTO.otros;
    gRows.push([new Date(g.fecha).toLocaleDateString('es-MX'),c.n,g.descripcion,g.inmueble||'',g.monto,g.notas||'']);
  });
  const totalG=gastos.reduce((s,g)=>s+Number(g.monto),0);
  gRows.push([]);gRows.push(['','','','TOTAL:',totalG]);
  const ws2=XLSX.utils.aoa_to_sheet(gRows);
  ws2['!cols']=[{w:12},{w:18},{w:35},{w:18},{w:12},{w:30}];
  XLSX.utils.book_append_sheet(wb,ws2,'Gastos');
  // Sheet 3: Resumen
  const resRows=[['CONCEPTO','MONTO'],['INGRESOS',totalIng],['GASTOS',totalG],['NETO',totalIng-totalG],[],['DESGLOSE GASTOS POR CATEGORÍA','']];
  const porCat={};gastos.forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+Number(g.monto)});
  Object.entries(porCat).forEach(([k,v])=>{const c=CATS_GASTO[k]||CATS_GASTO.otros;resRows.push([c.n,v]);});
  const ws3=XLSX.utils.aoa_to_sheet(resRows);
  ws3['!cols']=[{w:35},{w:15}];
  XLSX.utils.book_append_sheet(wb,ws3,'Resumen');
  const fn=`movimientos_${r.ini.toISOString().slice(0,10)}_${r.fin.toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fn);
  snack(`📥 Excel · ${pagosFiltered.length} ingresos, ${gastos.length} gastos`);
}

// ─── Inquilinos CRUD ───────────────────────────────
function renderInq(){
  const todos=DB.inquilinos;
  if(!todos.length){document.getElementById("v-inq").innerHTML=`<div class="es"><div class="ei">👥</div><div class="et">Sin inquilinos</div></div>`;return;}
  let html=`<input class="fi" id="search-inq" placeholder="🔍 Buscar..." oninput="renderInqList()" style="margin-bottom:12px"><div id="inq-list"></div>`;
  document.getElementById("v-inq").innerHTML=html;
  renderInqList();
}
function renderInqList(){
  const q=(document.getElementById("search-inq")?.value||"").toLowerCase();
  const todos=DB.inquilinos.filter(i=>!q||i.nombre.toLowerCase().includes(q)||i.inmueble.toLowerCase().includes(q));
  const act=todos.filter(i=>i.estado==="activo");
  const inact=todos.filter(i=>i.estado!=="activo");
  let html="";
  if(act.length){
    // Agrupar por inmueble
    const grupos={};
    act.forEach(i=>{if(!grupos[i.inmueble])grupos[i.inmueble]=[];grupos[i.inmueble].push(i);});
    Object.values(grupos).forEach(g=>g.sort((a,b)=>(a.dia||0)-(b.dia||0)||a.nombre.localeCompare(b.nombre)));
    html+=`<div class="st">Activos (${act.length}) · ${Object.keys(grupos).length} inmuebles</div>`;
    // Si hay búsqueda activa, expandir todos por default
    const searchOn=!!q;
    Object.keys(grupos).sort().forEach(inm=>{
      const items=grupos[inm];
      const totRenta=items.reduce((s,i)=>s+Number(i.renta),0);
      const propietario=items[0]?.propietario||'';
      const key='inq_'+inm;
      const open=searchOn||expandedInm[key]!==false;
      html+=`<div class="inm-group">
        <div class="inm-hd" onclick="toggleInqInm('${inm.replace(/'/g,"\\'")}')">
          <div class="inm-hd-l"><span class="inm-arrow ${open?'open':''}">▶</span>
          <div><div class="inm-nom">${inm}${propietario?` <span style="font-size:9px;color:var(--dim);font-weight:400;letter-spacing:1px">${propietario}</span>`:''}</div>
          <div class="inm-meta">${items.length} inquilinos · ${fmt(totRenta)}/mes</div></div></div>
        </div>
        <div class="inm-body ${open?'open':''}">
          ${items.map(tileInqGrouped).join('')}
        </div></div>`;
    });
  }
  if(inact.length){
    html+=`<div class="st" style="margin-top:14px">Inactivos (${inact.length})</div>`+inact.map(tileH).join("");
  }
  if(!act.length&&!inact.length)html+=`<div class="es"><div class="ei">🔍</div><div class="et">Sin resultados</div></div>`;
  document.getElementById("inq-list").innerHTML=html;
}

function toggleInqInm(inm){
  const k='inq_'+inm;
  expandedInm[k]=expandedInm[k]===false?true:false;
  renderInqList();
}

function saveTenant(id){
  const nom=document.getElementById('m-nom').value.trim();
  const inm=document.getElementById('m-inm').value.trim();
  const rent=document.getElementById('m-rent').value;
  if(!nom||!inm||!rent){snack('Completa los campos obligatorios');return;}
  const obj={nombre:nom,inmueble:inm,interior:document.getElementById('m-int').value.trim(),renta:Number(rent),
    dia:Number(document.getElementById('m-dia').value)||5,destino:document.getElementById('m-dest').value.trim(),
    servicios:document.getElementById('m-srv').value.trim(),estatus:document.getElementById('m-est').value.trim(),
    renovacion:document.getElementById('m-ren').value,contrato_vigente:document.getElementById('m-cv').value,
    comentarios:document.getElementById('m-com').value.trim(),estado:document.getElementById('m-estado').value,
    propietario:document.getElementById('m-prop').value};
  if(id){Object.assign(DB.inquilinos.find(x=>x.id===id),obj);}else{DB.inquilinos.push({id:uid(),...obj});}
  saveDB('inquilinos');closeM();snack(id?'Actualizado ✓':'Agregado ✓');
  if(curView==='inq')renderInqList();
  else if(curView==='det'&&detTenant?.id===id){detTenant=DB.inquilinos.find(x=>x.id===id);renderDet();}
  else if(curView==='con')renderCon();
  updNotif();
}

function delTenant(id){
  const t=DB.inquilinos.find(x=>x.id===id);if(!t)return;
  const numPagos=DB.pagos.filter(p=>p.iid===id).length;
  let msg=`¿Eliminar a ${t.nombre} (${t.inmueble})?`;
  if(numPagos>0)msg+=`\n\n⚠️ Tiene ${numPagos} pagos registrados que también se eliminarán.`;
  msg+='\n\nEsta acción NO se puede deshacer. Considera marcarlo como Inactivo en su lugar.';
  if(!confirm(msg))return;
  DB.inquilinos=DB.inquilinos.filter(x=>x.id!==id);
  DB.pagos=DB.pagos.filter(p=>p.iid!==id);
  saveDB('inquilinos');saveDB('pagos');
  closeM();snack('Inquilino eliminado');
  if(curView==='det'){detTenant=null;go('inq');}
  else if(curView==='inq')renderInqList();
  else if(curView==='con')renderCon();
}

function smartImportInquilinos(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        const newList=d.inquilinos||[];
        if(!newList.length){snack('JSON sin inquilinos');return;}
        // Match by nombre+inmueble (case insensitive)
        const existingByKey=new Map();
        DB.inquilinos.forEach(t=>{
          const k=(t.nombre+'|'+t.inmueble).toLowerCase().trim();
          existingByKey.set(k,t);
        });
        const updated=[];const matchedIds=new Set();
        let nuevos=0,actualizados=0;
        newList.forEach(n=>{
          const k=(n.nombre+'|'+n.inmueble).toLowerCase().trim();
          const ex=existingByKey.get(k);
          if(ex){
            updated.push({...ex,...n,id:ex.id});  // preserve ID, merge data
            matchedIds.add(ex.id);
            actualizados++;
          }else{
            updated.push({...n,id:uid()});
            nuevos++;
          }
        });
        // Keep old tenants not in new list, mark as inactive
        let inactivados=0;
        DB.inquilinos.forEach(t=>{
          if(!matchedIds.has(t.id)){
            updated.push({...t,estado:'inactivo'});
            inactivados++;
          }
        });
        if(!confirm(`Resultado de actualización:\n\n• ${actualizados} inquilinos actualizados\n• ${nuevos} inquilinos nuevos\n• ${inactivados} inquilinos marcados como inactivos\n\nLos pagos existentes se conservan. ¿Aplicar?`))return;
        DB.inquilinos=updated;
        saveDB('inquilinos');
        snack('✓ Inquilinos actualizados');
        renderRep();
      }catch(err){snack('Error: '+err.message)}
    };r.readAsText(f);
  };inp.click();
}

async function handlePhotos(e,max){
  const files=Array.from(e.target.files).slice(0,max-pendingPhotos.length);
  if(pendingPhotos.length+files.length>max){snack('Máx '+max+' fotos');return;}
  for(const f of files){
    try{
      const b64=await compressImage(f);
      pendingPhotos.push(b64);
    }catch(err){snack('Error procesando foto')}
  }
  e.target.value='';
  // Find which grid is open
  if(document.getElementById('o-photos-grid'))renderPendingPhotos('o-photos-grid');
  if(document.getElementById('i-photos-grid'))renderPendingPhotos('i-photos-grid');
  if(document.getElementById('ins-photos-grid'))renderPendingPhotos('ins-photos-grid');
}

function renderPendingPhotos(gridId){
  const grid=document.getElementById(gridId);
  if(!grid)return;
  let html='';
  pendingPhotos.forEach((p,idx)=>{
    html+=`<div class="photo-thumb" style="background-image:url('${p}')" onclick="viewFullImg('${idx}','pending')"><button class="photo-remove" onclick="event.stopPropagation();removePending(${idx},'${gridId}')">×</button></div>`;
  });
  grid.innerHTML=html;
}

function removePending(idx,gridId){
  pendingPhotos.splice(idx,1);
  renderPendingPhotos(gridId);
}

function viewFullImg(idx,src){
  let img='';
  if(src==='pending')img=pendingPhotos[idx];
  else img=idx;
  const ov=document.createElement('div');
  ov.className='full-img';
  ov.innerHTML=`<img src="${img}"><button onclick="this.parentElement.remove()">✕</button>`;
  ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}

function saveObra(id){
  const tipo=document.getElementById('o-tipo').value;
  const fecha=document.getElementById('o-fecha').value;
  const costo=document.getElementById('o-costo').value;
  const inm=document.getElementById('o-inm').value.trim();
  const desc=document.getElementById('o-desc').value.trim();
  if(!fecha||!costo||!inm||!desc){snack('Completa los campos obligatorios');return;}
  const [yy,mm,dd]=fecha.split('-').map(Number);
  const now=new Date();
  const fechaLocal=new Date(yy,mm-1,dd,now.getHours(),now.getMinutes(),now.getSeconds());
  const obj={
    tipo,fecha:fechaLocal.toISOString(),
    costo:Number(costo),inmueble:inm,descripcion:desc,
    trabajador:document.getElementById('o-trab').value.trim(),
    fotos:[...pendingPhotos],
    gastoVinculado:document.getElementById('o-gasto').value==='si'
  };
  if(id){
    const ex=DB.obras.find(x=>x.id===id);
    // Remove existing linked gasto if any
    if(ex.gastoId)DB.gastos=DB.gastos.filter(g=>g.id!==ex.gastoId);
    Object.assign(ex,obj);
  }else{
    DB.obras.push({id:uid(),...obj,creado:nowISO()});
  }
  // Crear gasto vinculado
  if(obj.gastoVinculado){
    const tn=TIPOS_OBRA[tipo]?.n||'Obra';
    const gastoId=uid();
    DB.gastos.push({
      id:gastoId,categoria:'mano_obra',monto:Number(costo),
      descripcion:`${tn} — ${desc.slice(0,40)}`,
      fecha:obj.fecha,inmueble:inm,notas:'Vinculado a reporte de obra',
      creado:nowISO(),obraId:id||DB.obras[DB.obras.length-1].id
    });
    if(id){DB.obras.find(x=>x.id===id).gastoId=gastoId;}
    else{DB.obras[DB.obras.length-1].gastoId=gastoId;}
    saveDB('gastos');
  }
  saveDB('obras');
  closeM();snack(id?'Obra actualizada ✓':'Reporte de obra creado ✓');
  pendingPhotos=[];
  renderRep();
}

function buildIncidenteInqOptions(lugar,selectedId){
  const lugarLower=(lugar||'').toLowerCase().trim();
  let inqs=DB.inquilinos.filter(x=>x.estado==='activo');
  if(lugarLower){
    inqs=inqs.filter(x=>{
      const inm=(x.inmueble||'').toLowerCase();
      return lugarLower.includes(inm)||inm.includes(lugarLower);
    });
  }
  // Include selected even if filter would exclude
  if(selectedId&&selectedId!=='_vacio_'&&!inqs.find(x=>x.id===selectedId)){
    const cur=DB.inquilinos.find(x=>x.id===selectedId);
    if(cur)inqs.push(cur);
  }
  let html=`<option value=""${!selectedId?' selected':''}>— Ninguno —</option>`;
  html+=`<option value="_vacio_"${selectedId==='_vacio_'?' selected':''}>🏠 Departamento vacío / sin inquilino</option>`;
  inqs.forEach(x=>{
    html+=`<option value="${x.id}"${selectedId===x.id?' selected':''}>${x.nombre}${x.interior?' · Int '+x.interior:''} — ${x.inmueble}</option>`;
  });
  return html;
}

    <div style="background:linear-gradient(135deg,#1a1a1a,#222);border:2px solid ${calColor};border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
      <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px">Calificación actual</div>
      <div style="font-family:'Playfair Display',serif;font-size:34px;color:${calColor};margin:4px 0">${scoreObt.toFixed(1)} <span style="font-size:18px;color:var(--dim)">/ ${scoreMax}</span></div>
      <div style="font-size:18px;color:${calColor};font-weight:700">${pct.toFixed(1)}%</div>
      <div style="height:6px;background:#252525;border-radius:3px;margin-top:10px;overflow:hidden"><div style="height:100%;background:${calColor};width:${pct}%;transition:width .3s"></div></div>
    </div>`;
  // Secciones
  Object.entries(INSPECCION_TEMPLATE).forEach(([catKey,cat])=>{
    let scoreCat=0,maxCat=0;
    cat.items.forEach(it=>{
      maxCat+=it.max;
      const est=ins.items?.[it.k]?.estado;
      if(est&&ESTADOS_INSP[est])scoreCat+=it.max*ESTADOS_INSP[est].mult;
    });
    html+=`<div style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--s2);border-radius:9px;margin-bottom:8px;border-left:3px solid var(--gold)">
        <div style="font-family:'Playfair Display',serif;font-size:15px;color:var(--gold)">${cat.nombre}</div>
        <div style="font-size:13px;font-weight:700;color:var(--gold)">${scoreCat.toFixed(1)} / ${maxCat}</div>
      </div>`;
    cat.items.forEach(it=>{
      const itemData=ins.items?.[it.k]||{};
      const est=itemData.estado||'';
      const obs=itemData.observaciones||'';
      html+=`<div style="background:var(--s1);border-radius:9px;padding:10px;margin-bottom:6px;border:1px solid #222">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${it.n}</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${it.prueba} · max ${it.max} pts</div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button onclick="setInspEstado('${it.k}','excelente')" style="width:32px;height:32px;border-radius:8px;border:${est==='excelente'?'2px solid #5CB87A':'1px solid #333'};background:${est==='excelente'?'#5CB87A33':'var(--s2)'};cursor:pointer;font-size:14px;padding:0">🟢</button>
            <button onclick="setInspEstado('${it.k}','medio')" style="width:32px;height:32px;border-radius:8px;border:${est==='medio'?'2px solid #E0B840':'1px solid #333'};background:${est==='medio'?'#E0B84033':'var(--s2)'};cursor:pointer;font-size:14px;padding:0">🟡</button>
            <button onclick="setInspEstado('${it.k}','malo')" style="width:32px;height:32px;border-radius:8px;border:${est==='malo'?'2px solid #E05C5C':'1px solid #333'};background:${est==='malo'?'#E05C5C33':'var(--s2)'};cursor:pointer;font-size:14px;padding:0">🔴</button>
          </div>

      <div style="font-size:10px;color:var(--dim);margin-top:6px">Evidencia visual del estado del departamento</div></div>
    <div class="fg"><label class="fl">Notas generales</label><textarea class="fi" id="ins-notas" rows="2">${ins.notas||''}</textarea></div>
    <div style="display:flex;gap:8px">
      ${ins.id?`<button class="btn bd" onclick="delInspeccion('${ins.id}')">🗑️ Eliminar</button>`:''}
      <button class="btn bg bfu" onclick="saveInspeccion()">Guardar inspección</button>
    </div></div>`;
  modal(html);
  renderPendingPhotos('ins-photos-grid');
}

function setInspEstado(k,estado){
  if(!curInspeccion.items)curInspeccion.items={};
  if(!curInspeccion.items[k])curInspeccion.items[k]={};
  // Toggle: si ya tenía ese estado, lo quita
  if(curInspeccion.items[k].estado===estado)curInspeccion.items[k].estado=null;
  else curInspeccion.items[k].estado=estado;
  // Save fields too
  curInspeccion.fecha=document.getElementById('ins-fecha').value;
  curInspeccion.inmueble=document.getElementById('ins-inmueble').value;
  curInspeccion.inspector=document.getElementById('ins-inspector').value;
  curInspeccion.inquilino_id=document.getElementById('ins-inq').value;
  curInspeccion.notas=document.getElementById('ins-notas').value;
  // Save scroll position
  const ms=document.querySelector('.ms');const scrollT=ms?.scrollTop||0;
  renderInspeccionForm();
  setTimeout(()=>{const ms2=document.querySelector('.ms');if(ms2)ms2.scrollTop=scrollT;},0);
}

function setInspObs(k,val){
  if(!curInspeccion.items)curInspeccion.items={};
  if(!curInspeccion.items[k])curInspeccion.items[k]={};
  curInspeccion.items[k].observaciones=val;
}

function saveInspeccion(){
  const ins=curInspeccion;
  ins.fecha=document.getElementById('ins-fecha').value;
  ins.inmueble=document.getElementById('ins-inmueble').value.trim();
  ins.inspector=document.getElementById('ins-inspector').value.trim();
  ins.inquilino_id=document.getElementById('ins-inq').value;
  ins.notas=document.getElementById('ins-notas').value.trim();
  ins.fotos=[...pendingPhotos];
  if(!ins.inmueble||!ins.fecha){snack('Falta inmueble o fecha');return;}
  // Calcular calificación final
  let scoreObt=0,scoreMax=0;
  Object.values(INSPECCION_TEMPLATE).forEach(cat=>{cat.items.forEach(it=>{
    scoreMax+=it.max;
    const est=ins.items?.[it.k]?.estado;
    if(est&&ESTADOS_INSP[est])scoreObt+=it.max*ESTADOS_INSP[est].mult;
  });});
  ins.score=scoreObt;ins.score_max=scoreMax;
  ins.porcentaje=scoreMax>0?(scoreObt/scoreMax*100):0;
  if(ins.id){Object.assign(DB.inspecciones.find(x=>x.id===ins.id),ins);}
  else{ins.id=uid();ins.creado=nowISO();DB.inspecciones.push(ins);}
  saveDB('inspecciones');
  closeM();
  snack(`✓ Inspección guardada · ${ins.porcentaje.toFixed(1)}%`);
  curInspeccion=null;
  renderRep();
}

  const ins=DB.inspecciones.find(x=>x.id===id);if(!ins)return;
  const inq=ins.inquilino_id?DB.inquilinos.find(x=>x.id===ins.inquilino_id):null;
  const calColor=ins.porcentaje>=80?'#5CB87A':ins.porcentaje>=60?'#E0B840':ins.porcentaje>=40?'#E58A2C':'#E05C5C';
  let html=`<div class="ms"><div class="mh"></div>
    <div class="mt2">🏠 Inspección — ${ins.inmueble}</div>
    <div style="background:linear-gradient(135deg,#1a1a1a,#222);border:2px solid ${calColor};border-radius:12px;padding:14px;margin-bottom:14px;text-align:center">
      <div style="font-size:10px;color:var(--dim)">Calificación final</div>
      <div style="font-family:'Playfair Display',serif;font-size:34px;color:${calColor};margin:4px 0">${(ins.score||0).toFixed(1)} <span style="font-size:18px;color:var(--dim)">/ ${ins.score_max||100}</span></div>
      <div style="font-size:20px;color:${calColor};font-weight:700">${(ins.porcentaje||0).toFixed(1)}%</div>
    </div>
    <div class="card" style="padding:6px 14px;margin-bottom:14px">
      <div class="ir"><span class="ik">Fecha</span><span class="iv">${new Date(ins.fecha).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})}</span></div>
      <div class="ir"><span class="ik">Inspector</span><span class="iv">${ins.inspector||'—'}</span></div>
      ${inq?`<div class="ir"><span class="ik">Inquilino</span><span class="iv">${inq.nombre}</span></div>`:''}
    </div>`;
  Object.entries(INSPECCION_TEMPLATE).forEach(([catKey,cat])=>{
    let scoreCat=0,maxCat=0;
    cat.items.forEach(it=>{
      maxCat+=it.max;
      const est=ins.items?.[it.k]?.estado;
      if(est&&ESTADOS_INSP[est])scoreCat+=it.max*ESTADOS_INSP[est].mult;
    });
    html+=`<div class="st-sm">${cat.nombre} · ${scoreCat.toFixed(1)}/${maxCat}</div><div class="card" style="padding:0 12px;margin-bottom:10px">`;
    cat.items.forEach(it=>{
      const d=ins.items?.[it.k]||{};
      const e=d.estado?ESTADOS_INSP[d.estado]:null;
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e1e1e">
        <div style="flex:1"><div style="font-size:13px">${it.n}</div>${d.observaciones?`<div style="font-size:10px;color:var(--dim);margin-top:2px">💬 ${d.observaciones}</div>`:''}</div>
        <div style="text-align:right">${e?`<span style="color:${e.c};font-weight:700">${e.i} ${e.l}</span>`:'<span style="color:var(--dim)">—</span>'}<div style="font-size:10px;color:var(--dim)">${e?(it.max*e.mult).toFixed(2):'0'}/${it.max}</div></div>
      </div>`;
    });
    html+=`</div>`;
  });
  if(ins.notas)html+=`<div class="st-sm">Notas generales</div><div class="card"><div style="font-size:13px;line-height:1.5">${ins.notas}</div></div>`;
  if(ins.fotos?.length){
    html+=`<div class="st-sm">Fotos (${ins.fotos.length})</div><div class="photo-grid">`;

  html+=`<div style="display:flex;gap:8px;margin-top:14px">
    <button class="btn bg" style="flex:1" onclick="genPDFInspeccion('${ins.id}')">📄 PDF</button>

    <button class="btn bd" onclick="delInspeccion('${ins.id}')">🗑️</button>

function delInspeccion(id){
  if(!confirm('¿Eliminar esta inspección?'))return;
  DB.inspecciones=DB.inspecciones.filter(x=>x.id!==id);
  saveDB('inspecciones');closeM();snack('Eliminado');renderRep();
}

// PDF de la inspección llena
function genPDFInspeccion(id){
  const ins=DB.inspecciones.find(x=>x.id===id);if(!ins)return;
  const inq=ins.inquilino_id?DB.inquilinos.find(x=>x.id===ins.inquilino_id):null;
  const doc=pdfBase('LISTA DE INSPECCIÓN DE DEPARTAMENTO',ins.inmueble);
  let y=42;
  // Info general
  doc.setFillColor(245,248,252);doc.rect(14,y-3,182,22,'F');
  doc.setDrawColor(200,210,225);doc.rect(14,y-3,182,22);
  doc.setTextColor(45,55,72);doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('Dirección: ',16,y+2);doc.setFont('helvetica','normal');doc.text(ins.inmueble,40,y+2);
  doc.setFont('helvetica','bold');doc.text('Fecha: ',16,y+8);doc.setFont('helvetica','normal');
  doc.text(new Date(ins.fecha).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}),32,y+8);
  if(ins.inspector){doc.setFont('helvetica','bold');doc.text('Inspector: ',16,y+14);doc.setFont('helvetica','normal');doc.text(ins.inspector,40,y+14);}
  if(inq){doc.setFont('helvetica','bold');doc.text('Inquilino: ',90,y+14);doc.setFont('helvetica','normal');doc.text(inq.nombre,116,y+14);}
  y+=26;
  // Calificación
  const calColor=ins.porcentaje>=80?[40,130,70]:ins.porcentaje>=60?[220,170,40]:[200,60,60];
  doc.setFillColor(...calColor);doc.rect(14,y,182,12,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(14);
  doc.text(`CALIFICACIÓN FINAL: ${(ins.score||0).toFixed(1)} / ${ins.score_max||100} (${(ins.porcentaje||0).toFixed(1)}%)`,105,y+8,'center');
  y+=18;
  // Tablas por sección
  Object.entries(INSPECCION_TEMPLATE).forEach(([catKey,cat])=>{
    if(y>250){doc.addPage();y=20;}
    // Header sección
    doc.setFillColor(91,155,213);doc.rect(14,y,182,8,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(10);
    let scoreCat=0,maxCat=0;
    cat.items.forEach(it=>{maxCat+=it.max;const est=ins.items?.[it.k]?.estado;if(est&&ESTADOS_INSP[est])scoreCat+=it.max*ESTADOS_INSP[est].mult;});
    doc.text(cat.nombre.toUpperCase(),16,y+5.5);
    doc.text(`${scoreCat.toFixed(1)} / ${maxCat}`,193,y+5.5,'right');
    y+=10;
    // Columnas: Item, Estado, Puntaje, Observaciones
    doc.setFillColor(240,245,250);doc.rect(14,y,182,6,'F');
    doc.setTextColor(60,70,90);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text('ITEM',16,y+4);doc.text('ESTADO',92,y+4);doc.text('PTS',125,y+4);doc.text('OBSERVACIONES',140,y+4);
    y+=7;
    cat.items.forEach((it,i)=>{
      if(y>280){doc.addPage();y=20;}
      doc.setFillColor(i%2===0?252:255,i%2===0?252:255,i%2===0?252:255);doc.rect(14,y-3,182,7,'F');
      doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');doc.setFontSize(8.5);
      doc.text(it.n.slice(0,40),16,y+1);
      const d=ins.items?.[it.k]||{};const e=d.estado?ESTADOS_INSP[d.estado]:null;
      if(e){
        const ec=e.c==='#5CB87A'?[40,130,70]:e.c==='#E0B840'?[200,160,40]:[200,60,60];
        doc.setTextColor(...ec);doc.setFont('helvetica','bold');doc.text(e.l,92,y+1);
        doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');
        doc.text(`${(it.max*e.mult).toFixed(2)}/${it.max}`,125,y+1);
      }else{
        doc.setTextColor(150,150,150);doc.text('—',92,y+1);doc.text(`0/${it.max}`,125,y+1);
      }
      if(d.observaciones){doc.setTextColor(80,80,80);doc.setFontSize(7.5);doc.text(d.observaciones.slice(0,38),140,y+1);}
      y+=7;
    });
    y+=4;
  });
  if(ins.notas){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(45,55,72);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('NOTAS GENERALES',14,y);y+=5;
    doc.setTextColor(40,40,40);doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.splitTextToSize(ins.notas,180).forEach(l=>{doc.text(l,14,y);y+=5;});
  }
  if(ins.fotos?.length){
    if(y>200){doc.addPage();y=20;}
    doc.setTextColor(45,55,72);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('EVIDENCIA FOTOGRÁFICA',14,y);y+=6;
    const cols=2,photoW=85,photoH=64,gap=4;
    ins.fotos.forEach((p,i)=>{
      const col=i%cols;
      const x=14+col*(photoW+gap);
      if(col===0&&y+photoH>275){doc.addPage();y=20;}
      try{doc.addImage(p,'JPEG',x,y,photoW,photoH);}catch(e){}
      if(col===cols-1||i===ins.fotos.length-1)y+=photoH+gap;
    });
  }
  doc.save(`inspeccion_${ins.inmueble.replace(/\s+/g,'_')}_${ins.fecha.slice(0,10)}.pdf`);
  snack('PDF descargado');
}

function exportFullBackup(){
  const data={inquilinos:DB.inquilinos,pagos:DB.pagos,servicios:DB.servicios,gastos:DB.gastos,obras:DB.obras,incidentes:DB.incidentes,otros_ingresos:DB.otros_ingresos,inmuebles:DB.inmuebles,inspecciones:DB.inspecciones,fecha:nowISO()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`respaldo_rentas_${todayISO()}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);snack('💾 Respaldo descargado');
}

function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);
        if(!confirm(`¿Reemplazar datos actuales?\nInquilinos: ${d.inquilinos?.length||0}\nPagos: ${d.pagos?.length||0}\nGastos: ${d.gastos?.length||0}\nObras: ${d.obras?.length||0}\nIncidentes: ${d.incidentes?.length||0}\nInspecciones: ${d.inspecciones?.length||0}`))return;
        ['inquilinos','pagos','servicios','gastos','obras','incidentes','otros_ingresos','inmuebles','inspecciones'].forEach(k=>{if(d[k])DB[k]=d[k];saveDB(k);});
        snack('✓ Importado');renderRep();
      }catch(err){snack('Error: '+err.message)}
    };r.readAsText(f);
  };inp.click();
}

function resetAll(){
  if(!confirm('¿Borrar TODOS los datos locales? Esta acción NO se puede deshacer.\n\nSe recomienda hacer respaldo primero.'))return;
  if(!confirm('¿Estás completamente seguro?'))return;
  ['inquilinos','pagos','servicios','gastos','obras','incidentes','otros_ingresos','inmuebles','inspecciones'].forEach(k=>localStorage.removeItem('rentas_'+k));
  location.reload();
}

// ─── PDF GENERATION ──────────────────────────────
function pdfBase(titulo,subtitulo){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  // Línea azul superior
  doc.setFillColor(91,155,213);doc.rect(0,0,210,1.5,'F');
  // Título en gris oscuro sobre blanco (imprime perfecto)
  doc.setTextColor(45,55,72);doc.setFontSize(20);doc.setFont('helvetica','bold');
  doc.text('GESTIÓN DE RENTAS',14,15);
  // Subtítulo en gris medio
  doc.setTextColor(110,118,135);doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(titulo,14,22);
  if(subtitulo){doc.setFontSize(9);doc.text(subtitulo,14,27);}
  doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text('Generado: '+new Date().toLocaleString('es-MX'),14,subtitulo?32:28);
  // Línea separadora gris claro
  doc.setDrawColor(220,225,235);doc.setLineWidth(0.3);
  doc.line(14,subtitulo?35:32,196,subtitulo?35:32);
  return doc;
}

    doc.text(fp,75,y);

}

function genPDFConciliacionConfig(){
  const r=document.getElementById('pdf-rango').value;
  if(r==='custom'){rangeStart=document.getElementById('pdf-ini').value;rangeEnd=document.getElementById('pdf-fin').value;rangeMode='custom';}
  else rangeMode=r;
  const incIng=document.getElementById('pdf-ing').checked;
  const incGas=document.getElementById('pdf-gas').checked;
  const incDet=document.getElementById('pdf-det').checked;
  closeM();
  genPDFConciliacion(incIng,incGas,incDet);
}

function genPDFConciliacion(incIng=true,incGas=true,incDet=true){
  const r=getRange(rangeMode);
  const doc=pdfBase('CONCILIACIÓN — '+r.label.toUpperCase());
  const pagos=DB.pagos.filter(p=>{if(!p.fecha_pago||!p.pagado)return false;const d=new Date(p.fecha_pago);return d>=r.ini&&d<=r.fin;});
  const ingresos=pagos.reduce((s,p)=>s+Number(p.monto),0);
  const gs=DB.gastos.filter(g=>{const d=new Date(g.fecha);return d>=r.ini&&d<=r.fin;});
  const gastos=gs.reduce((s,g)=>s+Number(g.monto),0);
  const neto=ingresos-gastos;
  let y=50;
  // Resumen visual
  doc.setFillColor(248,248,248);doc.rect(14,y-4,182,46,'F');
  doc.setDrawColor(200,210,225);doc.setLineWidth(0.3);doc.rect(14,y-4,182,46);
  doc.setTextColor(neto>=0?40:200,neto>=0?130:60,neto>=0?70:60);doc.setFont('helvetica','bold');doc.setFontSize(22);
  doc.text(fmt(neto),105,y+8,'center');
  doc.setTextColor(100,100,100);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('NETO DEL PERIODO',105,y+15,'center');
  doc.setTextColor(40,130,70);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('+ '+fmt(ingresos),55,y+28,'center');
  doc.setTextColor(100,100,100);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('INGRESOS ('+pagos.length+')',55,y+34,'center');
  doc.setTextColor(200,60,60);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('− '+fmt(gastos),155,y+28,'center');
  doc.setTextColor(100,100,100);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('GASTOS ('+gs.length+')',155,y+34,'center');
  y+=54;
  // Gastos por categoría
  if(incGas&&gs.length>0){
    doc.setTextColor(91,155,213);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('GASTOS POR CATEGORÍA',14,y);y+=6;
    const porCat={};gs.forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+Number(g.monto)});
    Object.entries(porCat).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
      const c=CATS_GASTO[k]||CATS_GASTO.otros;
      if(y>270){doc.addPage();y=20;}
      doc.setFillColor(250,250,250);doc.rect(14,y-3,182,7,'F');
      doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');doc.setFontSize(10);
      doc.text(c.n,18,y+1);doc.setFont('helvetica','bold');doc.setTextColor(200,60,60);
      doc.text(fmt(v),183,y+1,'right');y+=8;
    });
    y+=4;
  }
  // Detalle ingresos
  if(incIng&&incDet&&pagos.length>0){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(40,130,70);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('INGRESOS DEL PERIODO',14,y);y+=6;
    doc.setFillColor(40,130,70);doc.rect(14,y,182,7,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
    doc.text('FECHA',16,y+5);doc.text('INQUILINO',45,y+5);doc.text('INMUEBLE',105,y+5);doc.text('MONTO',183,y+5,'right');y+=9;
    pagos.sort((a,b)=>new Date(a.fecha_pago)-new Date(b.fecha_pago)).forEach((p,i)=>{
      if(y>275){doc.addPage();y=20;}
      const t=DB.inquilinos.find(x=>x.id===p.iid);
      doc.setFillColor(i%2===0?248:255,i%2===0?252:255,i%2===0?248:255);doc.rect(14,y-3,182,7,'F');
      doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');doc.setFontSize(8.5);
      doc.text(new Date(p.fecha_pago).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit'}),16,y+1);
      doc.text((t?.nombre||'?').slice(0,28),45,y+1);doc.text((t?.inmueble||'').slice(0,28),105,y+1);
      doc.setFont('helvetica','bold');doc.setTextColor(40,130,70);doc.text(fmt(p.monto),183,y+1,'right');y+=7;
    });
    y+=4;
  }
  // Detalle gastos
  if(incGas&&incDet&&gs.length>0){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(200,60,60);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('GASTOS DEL PERIODO',14,y);y+=6;

    });

  doc.save('conciliacion_'+r.ini.toISOString().slice(0,10)+'_'+r.fin.toISOString().slice(0,10)+'.pdf');
  snack('📄 PDF descargado');
}

  // Descripción
  doc.setTextColor(91,155,213);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('DESCRIPCIÓN',14,y);y+=5;
  doc.setTextColor(40,40,40);doc.setFontSize(10);doc.setFont('helvetica','normal');
  const lines=doc.splitTextToSize(o.descripcion,180);
  lines.forEach(l=>{doc.text(l,14,y);y+=5;});
  y+=4;
  // Fotos
  if(o.fotos?.length){
    if(y>200){doc.addPage();y=20;}
    doc.setTextColor(91,155,213);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('EVIDENCIA FOTOGRÁFICA',14,y);y+=6;
    const cols=2;const photoW=85;const photoH=64;const gap=4;
    o.fotos.forEach((p,i)=>{
      const col=i%cols;const row=Math.floor(i/cols);
      const x=14+col*(photoW+gap);
      if(col===0&&y+photoH>275){doc.addPage();y=20;}
      try{doc.addImage(p,'JPEG',x,y,photoW,photoH);}catch(e){}
      if(col===cols-1||i===o.fotos.length-1){y+=photoH+gap;}
    });
  }
  doc.save('obra_'+t.n+'_'+o.inmueble.replace(/\s+/g,'_')+'_'+o.fecha.slice(0,10)+'.pdf');
  snack('PDF descargado');
}

  y+=22;
  // Nivel
  const rc=[200,60,60];if(n.k===1){rc[0]=40;rc[1]=130;rc[2]=70;}else if(n.k===2){rc[0]=220;rc[1]=180;rc[2]=60;}else if(n.k===3){rc[0]=229;rc[1]=138;rc[2]=44;}
  doc.setFillColor(rc[0],rc[1],rc[2]);doc.rect(14,y-4,182,8,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('NIVEL DE IMPORTANCIA: '+n.n.toUpperCase(),105,y+2,'center');y+=12;
  // Info
  const info=[['Fecha',new Date(i.fecha).toLocaleString('es-MX',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})],['Lugar',i.lugar],['Inquilino',inq?inq.nombre:'No asociado']];
  info.forEach(([k,v],idx)=>{
    doc.setFillColor(idx%2===0?248:255,idx%2===0?248:255,idx%2===0?248:255);doc.rect(14,y-4,182,7,'F');
    doc.setFont('helvetica','bold');doc.setTextColor(60,60,60);doc.setFontSize(10);doc.text(k+':',16,y);
    doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(String(v),50,y);y+=7;
  });
  y+=4;
  doc.setTextColor(91,155,213);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('DESCRIPCIÓN',14,y);y+=5;
  doc.setTextColor(40,40,40);doc.setFontSize(10);doc.setFont('helvetica','normal');
  const lines=doc.splitTextToSize(i.descripcion,180);lines.forEach(l=>{doc.text(l,14,y);y+=5;});y+=4;
  if(i.accion){
    doc.setTextColor(91,155,213);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('ACCIÓN TOMADA',14,y);y+=5;
    doc.setTextColor(40,40,40);doc.setFontSize(10);doc.setFont('helvetica','normal');
    const al=doc.splitTextToSize(i.accion,180);al.forEach(l=>{doc.text(l,14,y);y+=5;});y+=4;
  }
  if(i.fotos?.length){
    if(y>200){doc.addPage();y=20;}
    doc.setTextColor(91,155,213);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('EVIDENCIA',14,y);y+=6;
    i.fotos.forEach((p,idx)=>{
      const x=14+(idx%2)*89;
      if(idx>0&&idx%2===0)y+=68;
      if(y+64>275){doc.addPage();y=20;}
      try{doc.addImage(p,'JPEG',x,y,85,64);}catch(e){}
    });
  }
  doc.save('incidente_'+i.numero+'.pdf');snack('PDF descargado');
}

// ─── Init ──────────────────────────────────────────────
function init(){
  loadDB(); // load from localStorage first (works offline)
  document.getElementById("splash").style.display="none";
  renderDash();updNotif();
  // Firebase auth handler will then upgrade to cloud sync if user is logged in
}
init();
</script>
